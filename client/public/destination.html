<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Destination</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
    <link rel="stylesheet" href="/style.css" />
    <script src="/scripts/header.js" defer></script>
    <script src="/scripts/destination.js" defer></script>
  </head>
  <body>
    <header></header>
    <main id="destination-content" class="container destination-info">
      <div class="destination-layout">
        <div class="image-container">
          <img id="image" src="" alt="Destination photo" />
        </div>
        <div class="destination-details">
          <h2 id="name"></h2>
          <p id="audience" class="meta"></p>
          <p id="pricePerDay" class="meta"></p>
          <p id="tripLength" class="meta"></p>
          <p id="bestFor" class="meta"></p>
          <p id="description" class="description"></p>
          <p id="submittedBy" class="meta"></p>
          <p id="submittedOn" class="meta"></p>
        </div>
      </div>
    </main>
  </body>
</html>
